name: Telegram Bot 24/7

on:
  schedule:
    - cron: '*/5 * * * *'
  push:
    branches: [main]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install
        run: cd telegram_bot && npm install
      - name: Run Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          ADMIN_TELEGRAM_ID: ${{ secrets.ADMIN_TELEGRAM_ID }}
        run: cd telegram_bot && timeout 250 node bot.js || true

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Interactive India Map</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial Unicode MS', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .map-container {
            position: relative;
            width: 100%;
            overflow: hidden;
            background: radial-gradient(ellipse at center, #2d4a3e 0%, #1a2f23 100%);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            padding: 20px;
        }
        
        .india-map {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .state {
            cursor: pointer;
            transition: all 0.3s ease;
            stroke: #fff;
            stroke-width: 1;
        }
        
        .state:hover, .state.active {
            filter: url(#glow);
            transform-origin: center;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 5px currentColor); }
            50% { filter: drop-shadow(0 0 20px currentColor) drop-shadow(0 0 40px currentColor); }
        }
        
        .state-label {
            pointer-events: none;
            font-size: 8px;
            fill: white;
            font-weight: bold;
            text-anchor: middle;
            opacity: 0.9;
        }
        
        .north { fill: #FF9933; }
        .south { fill: #138808; }
        .east { fill: #000080; }
        .west { fill: #FF6600; }
        .northeast { fill: #9932CC; }
        .center { fill: #FFD700; }
        .ut { fill: #C0C0C0; }
        
        .legend {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
            font-size: 12px;
        }
        
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid white;
        }
        
        .tooltip {
            position: fixed;
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 16px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1000;
            border: 2px solid #FF9933;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 300px;
        }
        
        .tooltip.show {
            opacity: 1;
        }
        
        .tooltip .native-name {
            font-size: 20px;
            margin-top: 5px;
            color: #FF9933;
        }
        
        .zoom-controls {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
        }
        
        .zoom-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: #FF9933;
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: all 0.3s;
        }
        
        .zoom-btn:hover {
            background: #e68a00;
            transform: scale(1.1);
        }
        
        .instructions {
            text-align: center;
            color: #aaa;
            margin-top: 15px;
            font-size: 14px;
        }
        
        @media (max-width: 768px) {
            .state-label { font-size: 5px; }
            .zoom-controls { right: 10px; }
            .zoom-btn { width: 40px; height: 40px; font-size: 20px; }
        }
    </style>
</head>

    <div class="zoom-controls">
        <button class="zoom-btn" onclick="zoomIn()">+</button>
        <button class="zoom-btn" onclick="zoomOut()">−</button>
        <button class="zoom-btn" onclick="resetZoom()" style="font-size:16px">↺</button>
    </div>
    
    <div class="tooltip" id="tooltip">
        <div class="state-name"></div>
        <div class="native-name"></div>
        <div class="language-info"></div>
    </div>
    
    <script>
        let currentScale = 1;
        const mapContainer = document.querySelector('.map-container');
        const svg = document.querySelector('.india-map');
        const tooltip = document.getElementById('tooltip');
        
        document.querySelectorAll('.state').forEach(state => {
            state.addEventListener('mouseenter', handleStateHover);
            state.addEventListener('mouseleave', handleStateLeave);
            state.addEventListener('click', handleStateClick);
            state.addEventListener('touchstart', handleStateClick);
        });
        
        function handleStateHover(e) {
            const state = e.target;
            state.classList.add('active');
            state.style.filter = 'url(#strongGlow)';
            state.style.transform = 'scale(1.02)';
            
            const rect = state.getBoundingClientRect();
            tooltip.querySelector('.state-name').textContent = state.dataset.name;
            tooltip.querySelector('.native-name').textContent = state.dataset.hindi;
            tooltip.querySelector('.language-info').textContent = 'Language: ' + state.dataset.language;
            tooltip.style.left = rect.left + rect.width / 2 - 100 + 'px';
            tooltip.style.top = rect.top - 80 + 'px';
            tooltip.classList.add('show');
        }
        
        function handleStateLeave(e) {
            const state = e.target;
            state.classList.remove('active');
            state.style.filter = '';
            state.style.transform = '';
            tooltip.classList.remove('show');
        }
        
        function handleStateClick(e) {
            e.preventDefault();
            const state = e.target;
            
            if (window.Android) {
                window.Android.onStateClicked(
                    state.dataset.name,
                    state.dataset.language,
                    state.dataset.hindi,
                    state.dataset.bengali,
                    state.dataset.tamil,
                    state.dataset.telugu,
                    state.dataset.marathi,
                    state.dataset.kannada,
                    state.dataset.malayalam,
                    state.dataset.gujarati,
                    state.dataset.punjabi,
                    state.dataset.urdu
                );
            } else {
                alert('State: ' + state.dataset.name + '\n' +
                      'Language: ' + state.dataset.language + '\n\n' +
                      'Change language to ' + state.dataset.language + '?');
            }
        }
        
        function zoomIn() {
            currentScale = Math.min(currentScale + 0.2, 5);
            applyZoom();
        }
        
        function zoomOut() {
            currentScale = Math.max(currentScale - 0.2, 0.5);
            applyZoom();
        }
        
        function resetZoom() {
            currentScale = 1;
            applyZoom();
        }
        
        function applyZoom() {
            svg.style.transform = 'scale(' + currentScale + ')';
            svg.style.transformOrigin = 'center center';
        }
        
        let touchStartDistance = 0;
        
        document.addEventListener('touchstart', e => {
            if (e.touches.length === 2) {
                touchStartDistance = getDistance(e.touches[0], e.touches[1]);
            }
        });
        
        document.addEventListener('touchmove', e => {
            if (e.touches.length === 2) {
                const currentDistance = getDistance(e.touches[0], e.touches[1]);
                const scale = currentDistance / touchStartDistance;
                currentScale = Math.max(0.5, Math.min(currentScale * scale, 5));
                applyZoom();
                touchStartDistance = currentDistance;
            }
        });
        
        function getDistance(touch1, touch2) {
            return Math.hypot(touch2.clientX - touch1.clientX, touch2.clientY - touch1.clientY);
        }
        
        let isDragging = false;
        let startX, startY, scrollLeft, scrollTop;
        
        mapContainer.addEventListener('mousedown', e => {
            isDragging = true;
            startX = e.pageX - mapContainer.offsetLeft;
            startY = e.pageY - mapContainer.offsetTop;
            mapContainer.style.cursor = 'grabbing';
        });
        
        mapContainer.addEventListener('mouseleave', () => {
            isDragging = false;
            mapContainer.style.cursor = 'grab';
        });
        
        mapContainer.addEventListener('mouseup', () => {
            isDragging = false;
            mapContainer.style.cursor = 'grab';
        });
        
        mapContainer.addEventListener('mousemove', e => {
            if (!isDragging) return;
            e.preventDefault();
            const x = e.pageX - mapContainer.offsetLeft;
            const y = e.pageY - mapContainer.offsetTop;
            mapContainer.scrollLeft = scrollLeft - (x - startX);
            mapContainer.scrollTop = scrollTop - (y - startY);
        });
        
        mapContainer.addEventListener('scroll', function() {
            scrollLeft = mapContainer.scrollLeft;
            scrollTop = mapContainer.scrollTop;
        });
    </script>
